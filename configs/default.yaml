# Default configuration for monocular depth estimation
# Tesla-style self-supervised training

# Model configuration
model:
  encoder: "resnet18"  # TODO: Can swap to resnet34, resnet50, efficientnet
  pretrained: true
  scales: [0, 1, 2, 3]  # Multi-scale output
  min_depth: 0.1
  max_depth: 100.0

# Dataset configuration
data:
  # TODO: Swap dataset path here
  data_root: "sample_data"
  height: 192
  width: 640
  frame_ids: [0, -1, 1]  # Target, previous, next
  num_scales: 4
  num_workers: 4
  batch_size: 12

# Training configuration
training:
  epochs: 20
  learning_rate: 1.0e-4
  weight_decay: 0.0
  scheduler: "step"  # "step" or "cosine"
  step_size: 15
  gamma: 0.1
  
  # Loss weights
  ssim_weight: 0.85
  smoothness_weight: 0.001
  use_auto_mask: true
  
  # Checkpointing
  checkpoint_dir: "checkpoints"
  save_frequency: 5
  
  # Logging
  log_frequency: 100
  tensorboard_dir: "runs"

# Inference configuration
inference:
  checkpoint: "checkpoints/best.pth"
  output_dir: "outputs"
